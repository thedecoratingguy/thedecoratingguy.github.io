<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Name1 | Portfolio</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
      color: #222;
    }

    header {
      text-align: center;
      padding: 40px 20px 20px;
      background: white;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2rem;
    }

    p {
      margin: 0;
      color: #666;
    }

    .gallery {
      max-width: 1100px;
      margin: 30px auto;
      padding: 0 20px 40px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
    }

    .card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .card img {
      width: 100%;
      height: 240px;
      object-fit: cover;
      display: block;
    }

    .caption {
      padding: 12px 14px;
      font-size: 0.95rem;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #777;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Your Name</h1>
    <p>Selected work</p>
  </header>

  <main class="gallery">
    <div class="card">
      <img src="images/work1.jpg" alt="Project 1">
      <div class="caption">Project 1</div>
    </div>

    <div class="card">
      <img src="images/work2.jpg" alt="Project 2">
      <div class="caption">Project 2</div>
    </div>

    <div class="card">
      <img src="images/work3.jpg" alt="Project 3">
      <div class="caption">Project 3</div>
    </div>

    <div class="card">
      <img src="images/work4.jpg" alt="Project 4">
      <div class="caption">Project 4</div>
    </div>

    <div class="card">
      <img src="images/work5.jpg" alt="Project 5">
      <div class="caption">Project 5</div>
    </div>

    <div class="card">
      <img src="images/work6.jpg" alt="Project 6">
      <div class="caption">Project 6</div>
    </div>
  </main>

  <footer>
    Contact: your@email.com
  </footer>
</body>
</html>
